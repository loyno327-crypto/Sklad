<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f7fb;
      color: #222;
    }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .sub { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
    .btn {
      display: block; width: 100%; border: none; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      text-align: left; font-size: 14px; font-weight: 700; cursor: pointer; background: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: 0.15s ease;
    }
    .btn:hover { background: #eef4ff; }
    .btn-primary { background: #2f6fed; color: #fff; }
    .btn-primary:hover { background: #2459bf; }
    .status { margin-top: 8px; font-size: 12px; color: #188038; font-weight: 700; min-height: 18px; }
  </style>
</head>
<body>
  <div class="title">Меню</div>
  <div class="sub">Все разделы доступны всем пользователям</div>
  <div id="buttons"></div>
  <div id="status" class="status"></div>

  <script>
    function escapeHtml(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function runAction(fnName, statusText) {
      document.getElementById('status').textContent = statusText;
      google.script.run
        .withSuccessHandler(function () { document.getElementById('status').textContent = ''; })
        .withFailureHandler(function (err) { document.getElementById('status').textContent = 'Ошибка: ' + (err.message || err); })[fnName]();
    }

    function makeButton(text, fnName, statusText, primary) {
      return '<button class="btn ' + (primary ? 'btn-primary' : '') + '" data-fn="' + escapeHtml(fnName) + '" data-status="' + escapeHtml(statusText) + '">' + escapeHtml(text) + '</button>';
    }

    const buttons = [
      makeButton('Дашборд кладовщика', 'openQuickStorekeeperDashboard', 'Открываем дашборд кладовщика...', true),
      makeButton('Инвентаризация', 'openQuickInventory', 'Открываем инвентаризацию...'),
      makeButton('Поиск товара', 'openQuickSearch', 'Открываем поиск товара...'),
      makeButton('Дашборд руководителя', 'openQuickManagementDashboard', 'Открываем дашборд руководителя...'),
      makeButton('Автопарк и поездки', 'openQuickFleetDashboard', 'Открываем панель автопарка и поездок...'),
      makeButton('Грузоперевозки', 'showCargoTripsApp', 'Открываем модуль грузоперевозок...'),
      makeButton('Обновить всё', 'openQuickRefreshAll', 'Обновляем данные...')
    ];

    document.getElementById('buttons').innerHTML = buttons.join('');
    document.querySelectorAll('#buttons .btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        runAction(btn.dataset.fn, btn.dataset.status);
      });
    });
  </script>
</body>
</html>
