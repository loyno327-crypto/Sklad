<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { color-scheme: light; }
    body { margin:0; font-family: Arial, sans-serif; background:#f3f4f6; }
    .app { display:flex; height:100vh; width:100vw; }
    .sidebar {
      width: 280px;
      background:#1f2937;
      color:#fff;
      padding:16px 12px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .title { font-size:18px; font-weight:700; margin:0 0 8px 6px; }
    .nav-btn {
      border:none; border-radius:10px; padding:12px;
      text-align:left; cursor:pointer;
      background:transparent; color:#e5e7eb; font-size:14px;
    }
    .nav-btn:hover { background:#374151; }
    .nav-btn.active { background:#2563eb; color:#fff; }
    .content { flex:1; display:flex; flex-direction:column; min-width:0; }
    .toolbar {
      height:56px; display:flex; align-items:center; padding:0 16px;
      background:#fff; border-bottom:1px solid #e5e7eb; font-weight:600;
    }
    .module-wrap { flex:1; position:relative; }
    iframe { width:100%; height:100%; border:none; background:#fff; }
    .loader, .error {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-size:16px; color:#4b5563;
    }
    .error { color:#dc2626; padding:24px; text-align:center; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content">
      <div class="toolbar" id="moduleTitle">Загрузка…</div>
      <div class="module-wrap">
        <div class="loader" id="loader">Загрузка модуля…</div>
        <div class="error" id="error" style="display:none"></div>
        <iframe id="moduleFrame" title="Модуль"></iframe>
      </div>
    </main>
  </div>

  <script>
    const modules = [
      { key: 'StorekeeperDashboard', title: 'Дашборд кладовщика' },
      { key: 'ManagementDashboard', title: 'Дашборд руководителя' },
      { key: 'FleetTripsDashboard', title: 'Автопарк и поездки' },
      { key: 'InventoryForm', title: 'Инвентаризация' },
      { key: 'SearchForm', title: 'Поиск товара' },
      { key: 'TripsApp', title: 'Грузоперевозки' }
    ];

    const initialModule = '<?= initialModule ?>' || 'StorekeeperDashboard';

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '<h1 class="title">Склад</h1>';
      modules.forEach((module) => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.textContent = module.title;
        btn.dataset.key = module.key;
        btn.onclick = () => loadModule(module.key);
        sidebar.appendChild(btn);
      });
    }

    function setActive(moduleKey) {
      document.querySelectorAll('.nav-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.key === moduleKey);
      });
    }

    function loadModule(moduleKey) {
      const moduleMeta = modules.find(m => m.key === moduleKey);
      if (!moduleMeta) return;

      setActive(moduleKey);
      document.getElementById('moduleTitle').textContent = moduleMeta.title;
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('error').style.display = 'none';

      google.script.run
        .withSuccessHandler((html) => {
          document.getElementById('loader').style.display = 'none';
          const frame = document.getElementById('moduleFrame');
          frame.srcdoc = html;
        })
        .withFailureHandler((err) => {
          document.getElementById('loader').style.display = 'none';
          const error = document.getElementById('error');
          error.style.display = 'flex';
          error.textContent = 'Ошибка загрузки модуля: ' + (err && err.message ? err.message : err);
        })
        .getUnifiedModuleHtml(moduleKey);
    }

    renderSidebar();
    loadModule(initialModule);
  </script>
</body>
</html>
